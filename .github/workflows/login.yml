name: Azure

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      environment:
        description: "env to deploy"
        required: true
        default: "dev"
        type: choice
        options:
          - dev
          - qa
          - prod

permissions:
  id-token: write
  contents: read

jobs:
  login:
    name: az login
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: "b2627148-1ec8-4d3c-8fce-9b188a906ccf"
          tenant-id: "f3a7f9ec-a9ee-4582-826d-6fdd1b261016"
          subscription-id: "0fe2604a-a62d-4f0c-8f57-3f547fa2291a"

      - name: Verify login
        run: |
          echo "az login successful"
          az account show
          az group list --output table
